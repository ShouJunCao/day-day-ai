<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI 通用记忆平台数据流架构图</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  body { background: #020617; margin: 0; padding: 24px; font-family: 'JetBrains Mono', monospace; }
  .container { max-width: 960px; margin: 0 auto; background: #020617; border: 1px solid #1e293b; border-radius: 12px; padding: 16px; }
  svg { width: 100%; height: auto; display: block; }
  .label { font-family: 'JetBrains Mono', monospace; fill: #e2e8f0; font-size: 11px; font-weight: 700; }
  .sublabel { font-family: 'JetBrains Mono', monospace; fill: #94a3b8; font-size: 9px; }
  .annotation { font-family: 'JetBrains Mono', monospace; fill: #64748b; font-size: 8px; }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
  .pulse { animation: pulse 2s infinite; }
</style>
</head>
<body>
<div class="container">
<svg viewBox="0 0 960 850" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#0f172a" stroke-width="1"/>
    </pattern>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#34d399"/>
    </marker>
    <marker id="arrow-r" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#fb7185"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#grid)"/>

  <!-- Main Title -->
  <text x="30" y="40" class="label" fill="#f8fafc" font-size="18">AI 通用记忆平台 · 数据流架构 (Data Flow Architecture)</text>
  <circle cx="720" cy="35" r="4" fill="#34d399" class="pulse"/>
  <text x="732" y="39" class="sublabel">v1.0 · Production Ready</text>

  <!-- ==================== ARROWS (Drawn first for z-order) ==================== -->
  <!-- Layer 1 to Layer 2 -->
  <path d="M 280,160 L 280,220" fill="none" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M 480,160 L 480,220" fill="none" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M 680,160 L 680,220" fill="none" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Layer 2 to Layer 3 -->
  <path d="M 120,310 L 120,370" fill="none" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M 300,310 L 300,370" fill="none" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M 480,310 L 480,370" fill="none" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M 660,310 L 660,370" fill="none" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M 840,310 L 840,370" fill="none" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Layer 3 to Layer 4 -->
  <path d="M 300,460 L 300,520" fill="none" stroke="#fb923c" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M 480,460 L 480,520" fill="none" stroke="#fb923c" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M 660,460 L 660,520" fill="none" stroke="#fb923c" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Layer 4 to Layer 5 (LLM) -->
  <path d="M 480,610 L 480,670" fill="none" stroke="#34d399" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Governance Arrows (Dashed) -->
  <path d="M 880,200 L 880,740" fill="none" stroke="#fb7185" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#arrow-r)"/>

  <!-- ==================== LAYER 1: INGESTION ==================== -->
  <rect x="20" y="70" width="920" height="110" rx="10" fill="rgba(8, 51, 68, 0.3)" stroke="#22d3ee" stroke-width="1"/>
  <text x="40" y="90" class="label" fill="#22d3ee">① 记忆写入层 (Memory Ingestion Layer)</text>
  <text x="300" y="90" class="sublabel">多源数据接入 · 解析 · 路由</text>

  <!-- Component: 用户输入 -->
  <rect x="160" y="110" width="140" height="50" rx="6" fill="rgba(8, 51, 68, 0.6)" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="230" y="130" text-anchor="middle" class="label">用户输入 / 对话</text>
  <text x="230" y="145" text-anchor="middle" class="sublabel">User Chat / Voice</text>

  <!-- Component: Agent 执行日志 -->
  <rect x="360" y="110" width="140" height="50" rx="6" fill="rgba(8, 51, 68, 0.6)" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="430" y="130" text-anchor="middle" class="label">Agent 执行日志</text>
  <text x="430" y="145" text-anchor="middle" class="sublabel">Tool Calls / Plans</text>

  <!-- Component: 外部数据源 -->
  <rect x="560" y="110" width="140" height="50" rx="6" fill="rgba(8, 51, 68, 0.6)" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="630" y="130" text-anchor="middle" class="label">外部知识库</text>
  <text x="630" y="145" text-anchor="middle" class="sublabel">Docs / APIs / CRM</text>

  <!-- Component: 提取与路由引擎 -->
  <rect x="760" y="110" width="150" height="50" rx="6" fill="rgba(6, 78, 59, 0.4)" stroke="#34d399" stroke-width="1.5"/>
  <text x="835" y="130" text-anchor="middle" class="label">提取 &amp; 路由引擎</text>
  <text x="835" y="145" text-anchor="middle" class="sublabel">Extraction &amp; Routing</text>

  <!-- ==================== LAYER 2: STORAGE ==================== -->
  <rect x="20" y="200" width="920" height="130" rx="10" fill="rgba(76, 29, 149, 0.2)" stroke="#a78bfa" stroke-width="1"/>
  <text x="40" y="220" class="label" fill="#a78bfa">② 分层记忆存储 (Memory Storage Layer)</text>
  <text x="280" y="220" class="sublabel">按类型隔离存储 · 专用引擎优化</text>

  <!-- Memory 1: 情景记忆 -->
  <rect x="40" y="240" width="160" height="70" rx="6" fill="rgba(76, 29, 149, 0.4)" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="120" y="265" text-anchor="middle" class="label">情景记忆 (Episodic)</text>
  <text x="120" y="280" text-anchor="middle" class="sublabel">Vector DB + Timeline</text>
  <text x="120" y="295" text-anchor="middle" class="sublabel">对话历史 / 事件流</text>

  <!-- Memory 2: 语义记忆 -->
  <rect x="220" y="240" width="160" height="70" rx="6" fill="rgba(76, 29, 149, 0.4)" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="300" y="265" text-anchor="middle" class="label">语义记忆 (Semantic)</text>
  <text x="300" y="280" text-anchor="middle" class="sublabel">Graph DB + Relational</text>
  <text x="300" y="295" text-anchor="middle" class="sublabel">事实 / 实体 / 规则</text>

  <!-- Memory 3: 程序记忆 -->
  <rect x="400" y="240" width="160" height="70" rx="6" fill="rgba(76, 29, 149, 0.4)" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="480" y="265" text-anchor="middle" class="label">程序记忆 (Procedural)</text>
  <text x="480" y="280" text-anchor="middle" class="sublabel">Structured DB / Git</text>
  <text x="480" y="295" text-anchor="middle" class="sublabel">SOP / Prompt / 工作流</text>

  <!-- Memory 4: 偏好记忆 -->
  <rect x="580" y="240" width="160" height="70" rx="6" fill="rgba(76, 29, 149, 0.4)" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="660" y="265" text-anchor="middle" class="label">偏好记忆 (Preference)</text>
  <text x="660" y="280" text-anchor="middle" class="sublabel">KV Store / JSON</text>
  <text x="660" y="295" text-anchor="middle" class="sublabel">用户画像 / 习惯 / 风格</text>

  <!-- Memory 5: 工作记忆 -->
  <rect x="760" y="240" width="160" height="70" rx="6" fill="rgba(76, 29, 149, 0.4)" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="840" y="265" text-anchor="middle" class="label">工作记忆 (Working)</text>
  <text x="840" y="280" text-anchor="middle" class="sublabel">Redis / In-Memory</text>
  <text x="840" y="295" text-anchor="middle" class="sublabel">临时状态 / 推理缓存</text>

  <!-- ==================== LAYER 3: RETRIEVAL & FUSION ==================== -->
  <rect x="20" y="350" width="920" height="130" rx="10" fill="rgba(6, 78, 59, 0.2)" stroke="#34d399" stroke-width="1"/>
  <text x="40" y="370" class="label" fill="#34d399">③ 检索与融合层 (Retrieval &amp; Fusion Layer)</text>

  <!-- Component: Query 解析 -->
  <rect x="40" y="390" width="180" height="60" rx="6" fill="rgba(6, 78, 59, 0.4)" stroke="#34d399" stroke-width="1.5"/>
  <text x="130" y="415" text-anchor="middle" class="label">Query 意图解析</text>
  <text x="130" y="430" text-anchor="middle" class="sublabel">Intent Classification</text>

  <!-- Component: 混合检索 -->
  <rect x="240" y="390" width="180" height="60" rx="6" fill="rgba(6, 78, 59, 0.4)" stroke="#34d399" stroke-width="1.5"/>
  <text x="330" y="415" text-anchor="middle" class="label">混合检索 (Hybrid Search)</text>
  <text x="330" y="430" text-anchor="middle" class="sublabel">Vector + Keyword + Graph</text>

  <!-- Component: 冲突解决 &amp; Rerank -->
  <rect x="440" y="390" width="180" height="60" rx="6" fill="rgba(6, 78, 59, 0.4)" stroke="#34d399" stroke-width="1.5"/>
  <text x="530" y="415" text-anchor="middle" class="label">冲突解决 &amp; Rerank</text>
  <text x="530" y="430" text-anchor="middle" class="sublabel">Conflict Resolution</text>

  <!-- Component: 上下文组装 -->
  <rect x="640" y="390" width="180" height="60" rx="6" fill="rgba(6, 78, 59, 0.4)" stroke="#34d399" stroke-width="1.5"/>
  <text x="730" y="415" text-anchor="middle" class="label">上下文组装 (Context Builder)</text>
  <text x="730" y="430" text-anchor="middle" class="sublabel">Token Budget Control</text>

  <!-- ==================== LAYER 4: CONSUMPTION ==================== -->
  <rect x="20" y="500" width="920" height="130" rx="10" fill="rgba(251, 146, 60, 0.15)" stroke="#fb923c" stroke-width="1"/>
  <text x="40" y="520" class="label" fill="#fb923c">④ 记忆消费层 (Consumption Layer)</text>

  <!-- Component: LLM 上下文注入 -->
  <rect x="40" y="540" width="200" height="60" rx="6" fill="rgba(251, 146, 60, 0.3)" stroke="#fb923c" stroke-width="1.5"/>
  <text x="140" y="565" text-anchor="middle" class="label">LLM 上下文注入</text>
  <text x="140" y="580" text-anchor="middle" class="sublabel">System Prompt / Context</text>

  <!-- Component: Agent 工具链调用 -->
  <rect x="280" y="540" width="200" height="60" rx="6" fill="rgba(251, 146, 60, 0.3)" stroke="#fb923c" stroke-width="1.5"/>
  <text x="380" y="565" text-anchor="middle" class="label">Agent 工具链调用</text>
  <text x="380" y="580" text-anchor="middle" class="sublabel">Tool Config / SOP Exec</text>

  <!-- Component: 用户画像同步 -->
  <rect x="520" y="540" width="200" height="60" rx="6" fill="rgba(251, 146, 60, 0.3)" stroke="#fb923c" stroke-width="1.5"/>
  <text x="620" y="565" text-anchor="middle" class="label">用户画像同步</text>
  <text x="620" y="580" text-anchor="middle" class="sublabel">Profile Update / Feedback</text>

  <!-- ==================== LAYER 5: LLM / OUTPUT ==================== -->
  <rect x="20" y="650" width="920" height="100" rx="10" fill="rgba(6, 78, 59, 0.2)" stroke="#34d399" stroke-width="1"/>
  <text x="40" y="670" class="label" fill="#34d399">⑤ 生成与执行 (Generation &amp; Execution)</text>

  <!-- Component: Foundation Model -->
  <rect x="180" y="690" width="200" height="40" rx="6" fill="rgba(6, 78, 59, 0.4)" stroke="#34d399" stroke-width="1.5"/>
  <text x="280" y="715" text-anchor="middle" class="label">基础模型 (LLM / VLM)</text>

  <!-- Component: Agent Action -->
  <rect x="420" y="690" width="200" height="40" rx="6" fill="rgba(6, 78, 59, 0.4)" stroke="#34d399" stroke-width="1.5"/>
  <text x="520" y="715" text-anchor="middle" class="label">Agent 执行动作</text>

  <!-- Component: Response -->
  <rect x="660" y="690" width="200" height="40" rx="6" fill="rgba(6, 78, 59, 0.4)" stroke="#34d399" stroke-width="1.5"/>
  <text x="760" y="715" text-anchor="middle" class="label">最终回复 / 产出</text>

  <!-- ==================== SIDE PANEL: GOVERNANCE ==================== -->
  <rect x="870" y="70" width="70" height="740" rx="10" fill="rgba(136, 19, 55, 0.2)" stroke="#fb7185" stroke-width="1.5"/>
  <text x="905" y="100" text-anchor="middle" class="label" fill="#fb7185" font-size="9">记忆治理</text>
  <text x="905" y="115" text-anchor="middle" class="label" fill="#fb7185" font-size="9">Governance</text>

  <!-- Governance Items -->
  <rect x="875" y="140" width="60" height="40" rx="4" fill="rgba(136, 19, 55, 0.3)" stroke="#fb7185" stroke-width="1"/>
  <text x="905" y="165" text-anchor="middle" class="sublabel">隐私/权限</text>

  <rect x="875" y="190" width="60" height="40" rx="4" fill="rgba(136, 19, 55, 0.3)" stroke="#fb7185" stroke-width="1"/>
  <text x="905" y="215" text-anchor="middle" class="sublabel">衰减/压缩</text>

  <rect x="875" y="240" width="60" height="40" rx="4" fill="rgba(136, 19, 55, 0.3)" stroke="#fb7185" stroke-width="1"/>
  <text x="905" y="265" text-anchor="middle" class="sublabel">版本控制</text>

  <rect x="875" y="290" width="60" height="40" rx="4" fill="rgba(136, 19, 55, 0.3)" stroke="#fb7185" stroke-width="1"/>
  <text x="905" y="315" text-anchor="middle" class="sublabel">审计/回滚</text>

  <!-- Summary Cards at bottom -->
  <rect x="20" y="770" width="290" height="50" rx="6" fill="rgba(30, 41, 59, 0.4)" stroke="#1e293b" stroke-width="1"/>
  <text x="40" y="790" class="label" fill="#f8fafc" font-size="10">核心设计原则</text>
  <text x="40" y="805" class="sublabel">分层存储 · 按需检索 · 显隐结合</text>

  <rect x="335" y="770" width="290" height="50" rx="6" fill="rgba(30, 41, 59, 0.4)" stroke="#1e293b" stroke-width="1"/>
  <text x="355" y="790" class="label" fill="#f8fafc" font-size="10">生产级要求</text>
  <text x="355" y="805" class="sublabel">低延迟检索 · 冲突解决 · Token预算</text>

  <rect x="650" y="770" width="290" height="50" rx="6" fill="rgba(30, 41, 59, 0.4)" stroke="#1e293b" stroke-width="1"/>
  <text x="670" y="790" class="label" fill="#f8fafc" font-size="10">持续演进</text>
  <text x="670" y="805" class="sublabel">自我更新 · 反馈学习 · 终身记忆</text>

</svg>
</div>
</body>
</html>
